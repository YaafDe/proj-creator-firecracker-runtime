name: security-refresh

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Choose security refresh version
        run: |
          version="$(date -u +v%Y.%m.%d)-security.${GITHUB_RUN_NUMBER}"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "PROJ_CREATOR_FIRECRACKER_RUNTIME_VERSION=$version" >> "$GITHUB_ENV"
          echo "BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/$version" >> "$GITHUB_ENV"
          echo "PROJ_CREATOR_FIRECRACKER_KERNEL_PUBLIC_BASE_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/$version" >> "$GITHUB_ENV"

      - name: Build Ubuntu kernel
        run: ./scripts/build-kernel.sh

      - name: Build rootfs
        run: ./scripts/build-rootfs.sh

      - name: Build runner
        run: ./scripts/build-runner.sh

      - name: Render manifest
        run: node scripts/render-manifest.mjs

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: false
          files: |
            artifacts/${{ env.VERSION }}/manifest.json
            artifacts/${{ env.VERSION }}/SHA256SUMS
            artifacts/${{ env.VERSION }}/vmlinux
            artifacts/${{ env.VERSION }}/rootfs.ext4
            artifacts/${{ env.VERSION }}/firecracker-runner
