name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v2026.05.0
        required: true
        default: v2026.05.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}
      PROJ_CREATOR_FIRECRACKER_RUNTIME_VERSION: ${{ inputs.version }}
      PROJ_CREATOR_FIRECRACKER_KERNEL_PUBLIC_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}
      PROJ_CREATOR_FIRECRACKER_KERNEL_PROVIDER: firecracker-ci
      PROJ_CREATOR_FIRECRACKER_CONFIG_VERSION: "5.10-no-acpi"
      PROJ_CREATOR_FIRECRACKER_SKIP_VMCLOCK: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        run: |
          case "$VERSION" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "version must look like v2026.05.0" >&2
              exit 1
              ;;
          esac

      - name: Show release context
        run: |
          echo "release version: $VERSION"
          echo "git sha: $GITHUB_SHA"
          echo "kernel provider: $PROJ_CREATOR_FIRECRACKER_KERNEL_PROVIDER"

      - name: Build Ubuntu guest kernel
        run: ./scripts/build-kernel.sh

      - name: Build rootfs
        run: ./scripts/build-rootfs.sh

      - name: Build runner
        run: ./scripts/build-runner.sh

      - name: Compress artifacts
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          ./scripts/compress-artifacts.sh

      - name: Render manifest
        run: node scripts/render-manifest.mjs

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: false
          files: |
            artifacts/${{ inputs.version }}/manifest.json
            artifacts/${{ inputs.version }}/SHA256SUMS
            artifacts/${{ inputs.version }}/vmlinux.zst
            artifacts/${{ inputs.version }}/rootfs.ext4.zst
            artifacts/${{ inputs.version }}/firecracker-runner.zst
