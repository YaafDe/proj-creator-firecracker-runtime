name: cleanup release assets

on:
  workflow_dispatch:
    inputs:
      keep_version:
        description: Release tag whose assets must be kept
        required: true
        default: v2026.05.3

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old release assets
        uses: actions/github-script@v7
        with:
          script: |
            const keepVersion = core.getInput('keep_version', { required: true });
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            for (const release of releases) {
              if (release.tag_name === keepVersion) {
                core.info(`keeping assets for ${release.tag_name}`);
                continue;
              }
              if (!release.tag_name.startsWith('v2026.05.')) {
                core.info(`skipping unrelated release ${release.tag_name}`);
                continue;
              }
              for (const asset of release.assets) {
                core.info(`deleting ${release.tag_name}/${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                });
              }
            }
