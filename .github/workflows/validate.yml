name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts
        run: |
          bash -n scripts/build-kernel.sh
          bash -n scripts/build-rootfs.sh
          bash -n scripts/build-runner.sh
          bash -n scripts/compress-artifacts.sh
          bash -n scripts/publish-release.sh
          bash -n scripts/smoke-runner.sh
          bash -n rootfs/proj-creator-init
          python3 -m py_compile runner/firecracker-runner
          grep -q -- '"/bin/bash", "-lc"' runner/firecracker-runner
          grep -q -- '/usr/bin/containerd' rootfs/proj-creator-init
          grep -q -- '--containerd=/run/containerd/containerd.sock' rootfs/proj-creator-init
          grep -q -- '--userland-proxy=false' rootfs/proj-creator-init
          grep -q -- 'chown appuser:appuser /workspace' rootfs/proj-creator-init
          grep -q -- '--uid 1000 --gid 1000' rootfs/Dockerfile
          grep -q -- 'chown appuser:appuser /workspace' rootfs/Dockerfile
          grep -q 'VIRTIO_MMIO_CMDLINE_DEVICES' scripts/build-kernel.sh
          ./scripts/smoke-runner.sh
          PROJ_CREATOR_FIRECRACKER_KERNEL_DRY_RUN=1 ./scripts/build-kernel.sh
          PROJ_CREATOR_FIRECRACKER_ROOTFS_DRY_RUN=1 ./scripts/build-rootfs.sh
          PROJ_CREATOR_FIRECRACKER_RUNTIME_VERSION=vvalidate ./scripts/build-runner.sh
      - name: Validate release workflow yaml
        run: test -f .github/workflows/release.yml
